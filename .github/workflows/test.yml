name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  full-and-clean-archive:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: inkypi-weather/package/InkyPi/install/requirements-dev.txt
      - name: Install hash-locked development dependencies
        run: python -m pip install --require-hashes -r inkypi-weather/package/InkyPi/install/requirements-dev.txt
      - name: Run complete Python 3.11 suite
        working-directory: inkypi-weather/package/InkyPi
        run: python -m pytest tests -q --no-header -p no:cacheprovider
      - name: Run tracked-only clean archive suite
        run: python tools/verify_clean_archive.py --pytest-args=-q

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: inkypi-weather/package/InkyPi/install/requirements-dev.txt
      - name: Install hash-locked development dependencies
        run: python -m pip install --require-hashes -r inkypi-weather/package/InkyPi/install/requirements-dev.txt
      - name: Ruff fatal and no-new-debt gate
        run: >-
          python -m ruff check --no-cache
          inkypi-weather/package/InkyPi/src
          inkypi-weather/package/InkyPi/tests
          tools/run_simulated_soak.py
          tools/verify_clean_archive.py
      - name: Whitespace gate
        shell: bash
        env:
          EVENT_BEFORE: ${{ github.event.before }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          zero_sha="0000000000000000000000000000000000000000"
          if [[ -n "${GITHUB_BASE_REF:-}" ]]; then
            base="$(git merge-base "origin/${GITHUB_BASE_REF}" HEAD)"
          elif [[ -n "${EVENT_BEFORE:-}" && "${EVENT_BEFORE}" != "${zero_sha}" ]] \
            && git cat-file -e "${EVENT_BEFORE}^{commit}" 2>/dev/null; then
            base="${EVENT_BEFORE}"
          elif git show-ref --verify --quiet "refs/remotes/origin/${DEFAULT_BRANCH}"; then
            base="$(git merge-base "origin/${DEFAULT_BRANCH}" HEAD)"
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            base="$(git rev-parse HEAD^)"
          else
            base="$(git hash-object -t tree /dev/null)"
          fi
          git diff --check "$base" HEAD

  shell-and-release-state:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: inkypi-weather/package/InkyPi/install/requirements-dev.txt
      - name: Install hash-locked development dependencies
        run: python -m pip install --require-hashes -r inkypi-weather/package/InkyPi/install/requirements-dev.txt
      - name: Parse release shell entry points
        run: >-
          bash -n
          inkypi-weather/package/InkyPi/install/bootstrap.sh
          inkypi-weather/package/InkyPi/install/healthcheck.sh
          inkypi-weather/package/InkyPi/install/install.sh
          inkypi-weather/package/InkyPi/install/uninstall.sh
          inkypi-weather/package/InkyPi/install/update.sh
          inkypi-weather/package/InkyPi/install/update_vendors.sh
          inkypi-weather/package/InkyPi/install/inkypi
          inkypi-weather/package/InkyPi/install/cli/inkypi-plugin
      - name: ShellCheck release entry points
        run: >-
          shellcheck --severity=error
          inkypi-weather/package/InkyPi/install/bootstrap.sh
          inkypi-weather/package/InkyPi/install/healthcheck.sh
          inkypi-weather/package/InkyPi/install/install.sh
          inkypi-weather/package/InkyPi/install/uninstall.sh
          inkypi-weather/package/InkyPi/install/update.sh
          inkypi-weather/package/InkyPi/install/update_vendors.sh
          inkypi-weather/package/InkyPi/install/inkypi
          inkypi-weather/package/InkyPi/install/cli/inkypi-plugin
      - name: Exercise release state failure injection
        working-directory: inkypi-weather/package/InkyPi
        run: >-
          python -m pytest -q --no-header -p no:cacheprovider
          tests/test_release_state.py
          tests/test_install_update.py
          tests/test_uninstall_preserves_data.py

  lock-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: inkypi-weather/package/InkyPi/install/requirements-dev.txt
      - name: Install and validate exact hashes
        run: |
          python -m pip install --require-hashes -r inkypi-weather/package/InkyPi/install/requirements-dev.txt
          python -m pip check
      - name: Validate release engineering contracts
        working-directory: inkypi-weather/package/InkyPi
        run: python -m pytest tests/test_requirements_contract.py tests/test_clean_archive_tool.py -q --no-header -p no:cacheprovider

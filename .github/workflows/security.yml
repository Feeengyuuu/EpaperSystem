name: security

on:
  push:
  pull_request:
  schedule:
    - cron: "23 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: inkypi-weather/package/InkyPi/install/requirements-dev.txt
      - name: Install hash-locked audit environment
        run: python -m pip install --require-hashes -r inkypi-weather/package/InkyPi/install/requirements-dev.txt
      - name: Audit runtime and development locks
        run: |
          python -m pip_audit --strict --require-hashes --disable-pip -r inkypi-weather/package/InkyPi/install/requirements.txt
          python -m pip_audit --strict --require-hashes --disable-pip -r inkypi-weather/package/InkyPi/install/requirements-dev.txt

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  aarch64-dependency-resolution:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Resolve the complete hash-locked Raspberry Pi artifact set
        working-directory: inkypi-weather/package/InkyPi
        run: |
          mkdir -p "${RUNNER_TEMP}/inkypi-aarch64-artifacts"
          python -m pip download \
            --dest "${RUNNER_TEMP}/inkypi-aarch64-artifacts" \
            --require-hashes --no-deps \
            --platform manylinux_2_28_aarch64 \
            --platform manylinux_2_17_aarch64 \
            --platform manylinux2014_aarch64 \
            --implementation cp \
            --python-version 311 \
            --abi cp311 --abi abi3 --abi none \
            -r install/requirements.txt

  simulated-soak:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: inkypi-weather/package/InkyPi/install/requirements-dev.txt
      - name: Install hash-locked soak environment
        run: python -m pip install --require-hashes -r inkypi-weather/package/InkyPi/install/requirements-dev.txt
      - name: Run 30-minute fake display and network soak
        run: python tools/run_simulated_soak.py --duration-seconds 1800

{% if supports_day_night_theme %}
<div class="form-group plugin-theme-control">
    <label for="themeMode" class="form-label">Display palette</label>
    <select id="themeMode" name="themeMode" class="form-input">
        <option value="auto"{% if plugin_theme_mode == 'auto' %} selected{% endif %}>Auto day/night</option>
        <option value="day"{% if plugin_theme_mode == 'day' %} selected{% endif %}>Day</option>
        <option value="night"{% if plugin_theme_mode == 'night' %} selected{% endif %}>Deep night</option>
    </select>
</div>
{% endif %}

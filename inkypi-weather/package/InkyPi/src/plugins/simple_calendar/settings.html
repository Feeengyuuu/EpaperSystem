<div style="margin-bottom:14px;">
    <div style="font-family: 'Helvetica Neue', Arial, sans-serif; font-size:1em; color:var(--text-primary); font-weight:500; background:var(--bg-secondary); padding:12px 14px; border-left:3px solid var(--border-color); border-radius:2px; line-height:1.4; max-width:100%;">
        Display a clean and minimal calendar with a highlighted current day and large date focus. Designed for quick readability and optimized for e-paper displays
    </div>
</div>

<div class="form-group">
	<span style="color: var(--text-primary);">If the date field is blank it will default to today's date.</span>
</div>
<div class="form-group">
	<label for="customDate" class="form-label">Date (optional)</label>
	<input type="date" id="customDate" name="customDate" class="form-input" />
</div>
<input type="hidden" id="refreshOnDisplay" name="refreshOnDisplay" value="true" />

<div class="form-group">
	<label for="language" class="form-label">Language:</label>
	<select id="language" name="language" class="form-input">
		<option value="nl">Dutch</option>
		<option value="en" selected>English</option>
		<option value="fr">French</option>
		<option value="de">German</option>
		<option value="id">Indonesian</option>
		<option value="it">Italian</option>
		<option value="pt">Portuguese</option>
		<option value="es">Spanish</option>
	</select>
</div>

<div class="form-group">
	<label for="layoutPosition" class="form-label">Layout Position:</label>
	<select id="layoutPosition" name="layoutPosition" class="form-input">
		<option value="left" selected>Left</option>
		<option value="right">Right</option>
	</select>
</div>

<div class="form-group">
	<label class="form-label">
		<input type="checkbox" id="showHolidays" name="showHolidays" value="true" checked onclick="this.value=this.checked ? 'true' : 'false'; document.getElementById('holidayPreset').value=this.checked ? 'us_cn' : 'off';" />
		Show US + China holidays
	</label>
	<input type="hidden" id="holidayPreset" name="holidayPreset" value="us_cn" />
	<div id="holidayCalendarList"></div>
</div>

<div class="form-group">
	<label class="form-label">
		<input type="checkbox" id="weatherPanelBackground" name="weatherPanelBackground" value="true" checked onclick="this.value=this.checked ? 'true' : 'false';" />
		Use today's weather as the date panel background
	</label>
</div>

<div class="form-group">
	<label for="weatherPanelBackgroundStyle" class="form-label">Weather background style:</label>
	<select id="weatherPanelBackgroundStyle" name="weatherPanelBackgroundStyle" class="form-input">
		<option value="classic">Classic monochrome</option>
		<option value="img2_original_heroes_weather">Comic heroes</option>
		<option value="img2_original_heroes_nyc_weather">NYC comic heroes</option>
		<option value="img2_original_heroes_local_top_weather">Local top weather variants</option>
		<option value="img2_original_heroes_mixed" selected>Mixed comic heroes</option>
	</select>
</div>

<div class="form-group">
	<label class="form-label">
		<input type="checkbox" id="dateHeroOverlays" name="dateHeroOverlays" value="true" checked onclick="this.value=this.checked ? 'true' : 'false';" />
		Overlay comic hero cutouts on the large date number
	</label>
</div>

<div class="form-group">
	<label class="form-label">
		<input type="checkbox" id="showPersonalCalendars" name="showPersonalCalendars" value="true" checked onclick="this.value=this.checked ? 'true' : 'false';" />
		Show private Google Calendar events
	</label>
	<div id="personalCalendarList"></div>
</div>

<div class="form-group">
		<div class="form-group">
			<label for="primaryColor" class="form-label">Primary Color:</label>
			<input type="color" id="primaryColor" name="primaryColor" class="color-picker" value="#e61a1a" />
		</div>
		<div class="form-group">
			<label for="highlightColor" class="form-label">Highlight Color:</label>
			<input type="color" id="highlightColor" name="highlightColor" class="color-picker" value="#a30d0d" />
		</div>
</div>

<script>
	const defaultHolidayCalendars = [
		{
			label: 'US',
			color: '#345995',
			url: 'https://calendar.google.com/calendar/ical/en.usa%23holiday%40group.v.calendar.google.com/public/basic.ics'
		},
		{
			label: 'CN',
			color: '#c62828',
			url: 'https://calendar.google.com/calendar/ical/china__zh_cn%40holiday.calendar.google.com/public/basic.ics'
		}
	];

	function addHolidayCalendarInput(source) {
		const calendarList = document.getElementById('holidayCalendarList');
		const row = document.createElement('div');
		row.className = 'calendar-entry';
		row.style.display = 'grid';
		row.style.gridTemplateColumns = '58px 48px 1fr';
		row.style.gap = '8px';
		row.style.marginTop = '8px';

		const label = document.createElement('input');
		label.type = 'text';
		label.name = 'holidayCalendarLabels[]';
		label.className = 'form-input';
		label.value = source.label || '';

		const color = document.createElement('input');
		color.type = 'color';
		color.name = 'holidayCalendarColors[]';
		color.className = 'color-picker';
		color.value = source.color || '#345995';

		const url = document.createElement('input');
		url.type = 'url';
		url.name = 'holidayCalendarURLs[]';
		url.className = 'form-input';
		url.value = source.url || '';

		row.appendChild(label);
		row.appendChild(color);
		row.appendChild(url);
		calendarList.appendChild(row);
	}

	function addPersonalCalendarInput(source) {
		const calendarList = document.getElementById('personalCalendarList');
		const row = document.createElement('div');
		row.className = 'calendar-entry';
		row.style.display = 'grid';
		row.style.gridTemplateColumns = '58px 48px 1fr';
		row.style.gap = '8px';
		row.style.marginTop = '8px';

		const label = document.createElement('input');
		label.type = 'text';
		label.name = 'personalCalendarLabels[]';
		label.className = 'form-input';
		label.value = source.label || 'CAL';

		const color = document.createElement('input');
		color.type = 'color';
		color.name = 'personalCalendarColors[]';
		color.className = 'color-picker';
		color.value = source.color || '#2e7d32';

		const url = document.createElement('input');
		url.type = 'url';
		url.name = 'personalCalendarURLs[]';
		url.className = 'form-input';
		url.placeholder = 'Google Calendar secret iCal URL';
		url.value = source.url || '';

		row.appendChild(label);
		row.appendChild(color);
		row.appendChild(url);
		calendarList.appendChild(row);
	}

	document.addEventListener('DOMContentLoaded', () => {
		if (loadPluginSettings) {
			document.getElementById('customDate').value = pluginSettings.customDate || '';
			const language = document.getElementById('language');
			language.value = pluginSettings.language || pluginSettings.locale || 'en';
			if (!language.querySelector(`option[value="${language.value}"]`)) {
				language.value = 'en';
			}
			document.getElementById('layoutPosition').value = pluginSettings.layoutPosition || 'left';
			const refreshOnDisplay = document.getElementById('refreshOnDisplay');
			const refreshOnDisplayEnabled = pluginSettings.refreshOnDisplay === undefined || pluginSettings.refreshOnDisplay === null
				? true
				: pluginSettings.refreshOnDisplay !== 'false' && pluginSettings.refreshOnDisplay !== false;
			refreshOnDisplay.value = refreshOnDisplayEnabled ? 'true' : 'false';
			document.querySelector('[name=primaryColor]').value = pluginSettings.primaryColor || '#e61a1a';
			document.querySelector('[name=highlightColor]').value = pluginSettings.highlightColor || '#a30d0d';
			const weatherPanelEnabled = pluginSettings.weatherPanelBackground !== 'false' && pluginSettings.weatherPanelBackground !== false;
			document.getElementById('weatherPanelBackground').checked = weatherPanelEnabled;
			document.getElementById('weatherPanelBackground').value = weatherPanelEnabled ? 'true' : 'false';
			const weatherStyle = document.getElementById('weatherPanelBackgroundStyle');
			weatherStyle.value = pluginSettings.weatherPanelBackgroundStyle || 'img2_original_heroes_mixed';
			if (!weatherStyle.querySelector(`option[value="${weatherStyle.value}"]`)) {
				weatherStyle.value = 'img2_original_heroes_mixed';
			}
			const heroSetting = pluginSettings.dateHeroOverlays;
			const heroEnabled = heroSetting === undefined || heroSetting === null
				? weatherStyle.value !== 'classic'
				: heroSetting !== 'false' && heroSetting !== false;
			document.getElementById('dateHeroOverlays').checked = heroEnabled;
			document.getElementById('dateHeroOverlays').value = heroEnabled ? 'true' : 'false';
			const personalEnabled = pluginSettings.showPersonalCalendars !== 'false' && pluginSettings.showPersonalCalendars !== false;
			document.getElementById('showPersonalCalendars').checked = personalEnabled;
			document.getElementById('showPersonalCalendars').value = personalEnabled ? 'true' : 'false';
			const holidaysEnabled = pluginSettings.showHolidays !== 'off' && pluginSettings.showHolidays !== false && pluginSettings.holidayPreset !== 'off';
			document.getElementById('showHolidays').checked = holidaysEnabled;
			document.getElementById('holidayPreset').value = holidaysEnabled ? (pluginSettings.holidayPreset || 'us_cn') : 'off';

			const urls = pluginSettings['holidayCalendarURLs[]'] || defaultHolidayCalendars.map(item => item.url);
			const labels = pluginSettings['holidayCalendarLabels[]'] || defaultHolidayCalendars.map(item => item.label);
			const colors = pluginSettings['holidayCalendarColors[]'] || defaultHolidayCalendars.map(item => item.color);
			urls.forEach((url, index) => {
				addHolidayCalendarInput({
					url,
					label: labels[index] || '',
					color: colors[index] || '#345995'
				});
			});

			const personalUrls = pluginSettings['personalCalendarURLs[]'] || [''];
			const personalLabels = pluginSettings['personalCalendarLabels[]'] || ['CAL'];
			const personalColors = pluginSettings['personalCalendarColors[]'] || ['#2e7d32'];
			personalUrls.forEach((url, index) => {
				addPersonalCalendarInput({
					url,
					label: personalLabels[index] || 'CAL',
					color: personalColors[index] || '#2e7d32'
				});
			});
		}
	});
</script>

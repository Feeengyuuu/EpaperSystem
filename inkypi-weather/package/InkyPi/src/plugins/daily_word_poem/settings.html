<div class="form-group">
  <label class="form-label" for="word_list">Word list</label>
  <textarea class="form-control" name="word_list" id="word_list" rows="6" placeholder="One English word per line. Leave blank for the built-in list."></textarea>
</div>

<div class="form-group">
  <label class="form-label" for="quote_list">Golden sentences</label>
  <textarea class="form-control" name="quote_list" id="quote_list" rows="5" placeholder="One quote per line. Use: Quote text - Author. Leave blank for the built-in famous quote list."></textarea>
</div>

<div class="form-group">
  <label class="form-label" for="font_family">Font</label>
  <select name="font_family" id="font_family">
    {% for font_name in available_fonts %}
      <option value="{{ font_name }}">{{ font_name }}</option>
    {% endfor %}
  </select>
</div>

<div class="form-group">
  <label><input type="checkbox" name="fetch_dictionary" id="fetch_dictionary" value="true" checked> Fetch definition from Free Dictionary API</label>
  <input type="hidden" name="fetch_dictionary" value="false">
</div>

<div class="form-group">
  <label><input type="checkbox" name="fetch_wikiquote" id="fetch_wikiquote" value="true" checked> Fetch quote of the day from Wikiquote</label>
  <input type="hidden" name="fetch_wikiquote" value="false">
</div>

<div class="form-group">
  <label><input type="checkbox" name="force_refresh" id="force_refresh"> Ignore today's cache once</label>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    if (typeof loadPluginSettings !== 'undefined' && loadPluginSettings) {
      for (const [key, value] of Object.entries(pluginSettings)) {
        const el = document.getElementById(key);
        if (!el) continue;
        if (el.type === 'checkbox') {
          el.checked = value === true || value === 'on' || value === 'true';
        } else {
          el.value = value;
        }
      }
    }

    const fontFamily = document.getElementById('font_family');
    if (fontFamily) {
      const hasStoredFont = typeof loadPluginSettings !== 'undefined'
        && loadPluginSettings
        && pluginSettings.font_family !== undefined;
      const yahei = [...fontFamily.options].find((option) => option.value === 'Microsoft YaHei');
      if (yahei && (!hasStoredFont || !fontFamily.value)) {
        fontFamily.value = 'Microsoft YaHei';
      }
    }
  });
</script>

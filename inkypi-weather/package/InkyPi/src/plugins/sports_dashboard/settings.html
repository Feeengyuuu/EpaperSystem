<div class="form-group">
    <label for="worldCupUrl" class="form-label">World Cup widget URL:</label>
    <input type="text" id="worldCupUrl" name="worldCupUrl" placeholder="https://www.sportbusy.com/embed/world-cup" class="form-input">
</div>

<div class="form-group">
    <label for="sportsDashboardTheme" class="form-label">Sports dashboard theme:</label>
    <select id="sportsDashboardTheme" name="sportsDashboardTheme" class="form-input">
        <option value="">Auto</option>
        <option value="day">Day</option>
        <option value="night">Deep night</option>
    </select>
</div>

<div class="form-group">
    <label for="footballDataKey" class="form-label">football-data.org API key:</label>
    <input type="password" id="footballDataKey" name="footballDataKey" placeholder="FOOTBALL_DATA key (optional)" class="form-input">
</div>

<div class="form-group">
    <label for="footballDataCompetition" class="form-label">football-data.org competition:</label>
    <input type="text" id="footballDataCompetition" name="footballDataCompetition" placeholder="WC" class="form-input">
</div>

<div class="form-group">
    <label for="footballDataSeason" class="form-label">football-data.org season:</label>
    <input type="number" id="footballDataSeason" name="footballDataSeason" min="2026" max="2030" placeholder="2026" class="form-input">
</div>

<div class="form-group">
    <label for="footballDataCacheHours" class="form-label">football-data.org cache hours:</label>
    <input type="number" id="footballDataCacheHours" name="footballDataCacheHours" min="1" max="24" placeholder="6" class="form-input">
</div>

<div class="form-group">
    <label for="footballDataDailyLimit" class="form-label">football-data.org daily request limit:</label>
    <input type="number" id="footballDataDailyLimit" name="footballDataDailyLimit" min="1" max="60" placeholder="8" class="form-input">
</div>

<div class="form-group">
    <label for="apiSportsKey" class="form-label">API-Sports free API key:</label>
    <input type="password" id="apiSportsKey" name="apiSportsKey" placeholder="x-apisports-key (optional)" class="form-input">
</div>

<div class="form-group">
    <label for="worldCupApiLeagueId" class="form-label">World Cup API league ID:</label>
    <input type="text" id="worldCupApiLeagueId" name="worldCupApiLeagueId" placeholder="1" class="form-input">
</div>

<div class="form-group">
    <label for="worldCupApiSeason" class="form-label">World Cup API season:</label>
    <input type="number" id="worldCupApiSeason" name="worldCupApiSeason" min="2026" max="2030" placeholder="2026" class="form-input">
</div>

<div class="form-group">
    <label for="worldCupApiCacheHours" class="form-label">World Cup API cache hours:</label>
    <input type="number" id="worldCupApiCacheHours" name="worldCupApiCacheHours" min="1" max="24" placeholder="6" class="form-input">
</div>

<div class="form-group">
    <label for="worldCupApiDailyLimit" class="form-label">World Cup API daily request limit:</label>
    <input type="number" id="worldCupApiDailyLimit" name="worldCupApiDailyLimit" min="1" max="90" placeholder="12" class="form-input">
</div>

<div class="form-group">
    <label class="form-label">
        <input type="checkbox" id="worldCupOddsEnabled" name="worldCupOddsEnabled" value="true">
        Show World Cup odds
    </label>
</div>

<div class="form-group">
    <label for="theOddsApiKey" class="form-label">The Odds API key:</label>
    <input type="password" id="theOddsApiKey" name="theOddsApiKey" placeholder="The Odds API key (optional)" class="form-input">
</div>

<div class="form-group">
    <label for="worldCupOddsProvider" class="form-label">World Cup odds provider:</label>
    <input type="text" id="worldCupOddsProvider" name="worldCupOddsProvider" placeholder="theoddsapi or oddsapiio" class="form-input">
</div>

<div class="form-group">
    <label for="worldCupOddsRegions" class="form-label">World Cup odds regions:</label>
    <input type="text" id="worldCupOddsRegions" name="worldCupOddsRegions" placeholder="us" class="form-input">
</div>

<div class="form-group">
    <label for="worldCupOddsBookmakers" class="form-label">World Cup odds bookmakers:</label>
    <input type="text" id="worldCupOddsBookmakers" name="worldCupOddsBookmakers" placeholder="Bet365" class="form-input">
</div>

<div class="form-group">
    <label for="worldCupOddsApiIoLeague" class="form-label">odds-api.io World Cup league:</label>
    <input type="text" id="worldCupOddsApiIoLeague" name="worldCupOddsApiIoLeague" placeholder="international-world-cup" class="form-input">
</div>

<div class="form-group">
    <label for="worldCupOddsCacheHours" class="form-label">World Cup odds cache hours:</label>
    <input type="number" id="worldCupOddsCacheHours" name="worldCupOddsCacheHours" min="1" max="24" placeholder="6" class="form-input">
</div>

<div class="form-group">
    <label for="worldCupOddsDailyLimit" class="form-label">World Cup odds daily request limit:</label>
    <input type="number" id="worldCupOddsDailyLimit" name="worldCupOddsDailyLimit" min="1" max="30" placeholder="8" class="form-input">
</div>

<div class="form-group">
    <label for="worldCupLeftWidth" class="form-label">World Cup panel width:</label>
    <input type="number" id="worldCupLeftWidth" name="worldCupLeftWidth" min="360" max="1200" placeholder="552" class="form-input">
</div>

<div class="form-group">
    <label for="worldCupVisibleMatches" class="form-label">World Cup visible matches:</label>
    <input type="number" id="worldCupVisibleMatches" name="worldCupVisibleMatches" min="1" max="7" placeholder="7" class="form-input">
</div>

<div class="form-group">
    <label for="worldCupCaptureWidth" class="form-label">World Cup capture width:</label>
    <input type="number" id="worldCupCaptureWidth" name="worldCupCaptureWidth" min="320" max="1200" placeholder="420" class="form-input">
</div>

<div class="form-group">
    <label for="localTimezone" class="form-label">Match timezone:</label>
    <input type="text" id="localTimezone" name="localTimezone" placeholder="America/Los_Angeles" class="form-input">
</div>

<div class="form-group">
    <label for="lplLeagueId" class="form-label">LPL league ID:</label>
    <input type="text" id="lplLeagueId" name="lplLeagueId" placeholder="98767991314006698" class="form-input">
</div>

<div class="form-group">
    <label class="form-label">
        <input type="checkbox" id="lplLiveRefreshEnabled" name="lplLiveRefreshEnabled" value="true">
        Quasi realtime LPL refresh during live matches
    </label>
</div>

<div class="form-group">
    <label for="lplLiveRefreshIntervalSeconds" class="form-label">LPL live refresh seconds:</label>
    <input type="number" id="lplLiveRefreshIntervalSeconds" name="lplLiveRefreshIntervalSeconds" min="60" max="900" placeholder="180" class="form-input">
</div>

<div class="form-group">
    <label class="form-label">
        <input type="checkbox" id="lplOddsEnabled" name="lplOddsEnabled" value="true">
        Show LPL odds
    </label>
</div>

<div class="form-group">
    <label for="lplOddsApiIoLeague" class="form-label">odds-api.io LPL league:</label>
    <input type="text" id="lplOddsApiIoLeague" name="lplOddsApiIoLeague" placeholder="league-of-legends-lpl" class="form-input">
</div>

<div class="form-group">
    <label for="lplOddsBookmakers" class="form-label">LPL odds bookmakers:</label>
    <input type="text" id="lplOddsBookmakers" name="lplOddsBookmakers" placeholder="Bet365" class="form-input">
</div>

<div class="form-group">
    <label for="lplOddsCacheHours" class="form-label">LPL odds cache hours:</label>
    <input type="number" id="lplOddsCacheHours" name="lplOddsCacheHours" min="1" max="48" placeholder="12" class="form-input">
</div>

<div class="form-group">
    <label for="lplOddsDailyLimit" class="form-label">LPL odds daily request limit:</label>
    <input type="number" id="lplOddsDailyLimit" name="lplOddsDailyLimit" min="1" max="12" placeholder="4" class="form-input">
</div>

<div class="form-group">
    <label class="form-label">
        <input type="checkbox" id="overlayWorldCupLocalTimes" name="overlayWorldCupLocalTimes" value="true">
        Replace visible World Cup ET times with local times
    </label>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (loadPluginSettings) {
            document.getElementById('sportsDashboardTheme').value = pluginSettings.sportsDashboardTheme || '';
            document.getElementById('worldCupUrl').value = pluginSettings.worldCupUrl || '';
            document.getElementById('footballDataKey').value = pluginSettings.footballDataKey || '';
            document.getElementById('footballDataCompetition').value = pluginSettings.footballDataCompetition || '';
            document.getElementById('footballDataSeason').value = pluginSettings.footballDataSeason || '';
            document.getElementById('footballDataCacheHours').value = pluginSettings.footballDataCacheHours || '';
            document.getElementById('footballDataDailyLimit').value = pluginSettings.footballDataDailyLimit || '';
            document.getElementById('apiSportsKey').value = pluginSettings.apiSportsKey || '';
            document.getElementById('worldCupApiLeagueId').value = pluginSettings.worldCupApiLeagueId || '';
            document.getElementById('worldCupApiSeason').value = pluginSettings.worldCupApiSeason || '';
            document.getElementById('worldCupApiCacheHours').value = pluginSettings.worldCupApiCacheHours || '';
            document.getElementById('worldCupApiDailyLimit').value = pluginSettings.worldCupApiDailyLimit || '';
            document.getElementById('worldCupOddsEnabled').checked = pluginSettings.worldCupOddsEnabled !== 'false';
            document.getElementById('theOddsApiKey').value = pluginSettings.theOddsApiKey || '';
            document.getElementById('worldCupOddsProvider').value = pluginSettings.worldCupOddsProvider || '';
            document.getElementById('worldCupOddsRegions').value = pluginSettings.worldCupOddsRegions || '';
            document.getElementById('worldCupOddsBookmakers').value = pluginSettings.worldCupOddsBookmakers || '';
            document.getElementById('worldCupOddsApiIoLeague').value = pluginSettings.worldCupOddsApiIoLeague || '';
            document.getElementById('worldCupOddsCacheHours').value = pluginSettings.worldCupOddsCacheHours || '';
            document.getElementById('worldCupOddsDailyLimit').value = pluginSettings.worldCupOddsDailyLimit || '';
            document.getElementById('worldCupLeftWidth').value = pluginSettings.worldCupLeftWidth || '';
            document.getElementById('worldCupVisibleMatches').value = pluginSettings.worldCupVisibleMatches || '';
            document.getElementById('worldCupCaptureWidth').value = pluginSettings.worldCupCaptureWidth || '';
            document.getElementById('localTimezone').value = pluginSettings.localTimezone || '';
            document.getElementById('lplLeagueId').value = pluginSettings.lplLeagueId || '';
            document.getElementById('lplLiveRefreshEnabled').checked = pluginSettings.lplLiveRefreshEnabled !== 'false';
            document.getElementById('lplLiveRefreshIntervalSeconds').value = pluginSettings.lplLiveRefreshIntervalSeconds || '';
            document.getElementById('lplOddsEnabled').checked = pluginSettings.lplOddsEnabled !== 'false';
            document.getElementById('lplOddsApiIoLeague').value = pluginSettings.lplOddsApiIoLeague || '';
            document.getElementById('lplOddsBookmakers').value = pluginSettings.lplOddsBookmakers || '';
            document.getElementById('lplOddsCacheHours').value = pluginSettings.lplOddsCacheHours || '';
            document.getElementById('lplOddsDailyLimit').value = pluginSettings.lplOddsDailyLimit || '';
            document.getElementById('overlayWorldCupLocalTimes').checked = pluginSettings.overlayWorldCupLocalTimes !== 'false';
        }
    });
</script>

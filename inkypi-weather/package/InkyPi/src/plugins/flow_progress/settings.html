<div style="margin-bottom:14px;">
    <div style="font-family: 'Helvetica Neue', Arial, sans-serif; font-size:1em; color:var(--text-primary); font-weight:500; background:var(--bg-secondary); padding:12px 14px; border-left:3px solid var(--border-color); border-radius:2px; line-height:1.4; max-width:100%;">
        Visualize the progress of your day, week, month and year using dot-based bars. Clean and optimized for e-paper displays
    </div>
</div>

<div class="form-group">
    <label for="language" class="form-label">Language:</label>
    <select id="language" name="language" class="form-input">
        <option value="nl">Dutch</option>
        <option value="en">English</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="id">Indonesian</option>
        <option value="it">Italian</option>
        <option value="pt">Portuguese</option>
        <option value="es">Spanish</option>
    </select>
</div>

<div class="form-group">
    <label for="numBars" class="form-label">Loading Bar Rows:</label>
    <select id="numBars" name="numBars" class="form-input">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
    </select>
</div>

<div class="form-group">
    <label for="numDots" class="form-label">Dots per Bar:</label>
    <input type="number" id="numDots" name="numDots" class="form-input" min="5" max="40" value="20" />
</div>

<div class="form-group">
    <div class="form-group">
        <label for="primaryColor" class="form-label">Primary Color:</label>
        <input type="color" id="primaryColor" name="primaryColor" class="color-picker" value="#ffffff"/>
    </div>
    <div class="form-group">
        <label for="secondaryColor" class="form-label">Secondary Color:</label>
        <input type="color" id="secondaryColor" name="secondaryColor" class="color-picker" value="#000000"/>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Always set defaults in JS, not via selected attribute
        const language = document.getElementById('language');
        const numBars = document.getElementById('numBars');
        const numDots = document.getElementById('numDots');
        if (typeof pluginSettings === 'object' && pluginSettings !== null) {
            language.value = pluginSettings.language || 'en';
            // Fallback to English if saved language is no longer available
            if (!language.querySelector(`option[value="${pluginSettings.language}"]`)) {
                language.value = 'en';
            }
            numBars.value = pluginSettings.numBars || '2';
            numDots.value = pluginSettings.numDots || '20';
            if (pluginSettings.primaryColor) {
                document.querySelector("[name=primaryColor]").value = pluginSettings.primaryColor;
            }
            if (pluginSettings.secondaryColor) {
                document.querySelector("[name=secondaryColor]").value = pluginSettings.secondaryColor;
            }
        } else {
            language.value = 'en';
            numBars.value = '2';
            numDots.value = '20';
        }
    });
</script>

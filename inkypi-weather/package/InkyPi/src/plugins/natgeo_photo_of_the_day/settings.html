<div class="form-group">
    <label for="fitMode" class="form-label">Fit mode:</label>
    <select id="fitMode" name="fitMode" class="form-input">
        <option value="contain" selected>Show full photo</option>
        <option value="cover">Fill screen by cropping</option>
    </select>
</div>

<div class="form-group">
    <label for="backgroundStyle" class="form-label">Background style:</label>
    <select id="backgroundStyle" name="backgroundStyle" class="form-input">
        <option value="blur" selected>Blurred photo backdrop</option>
        <option value="plain">Plain black</option>
    </select>
</div>

<div class="form-group">
    <label for="showLogo" class="form-label">Logo:</label>
    <select id="showLogo" name="showLogo" class="form-input">
        <option value="true" selected>Show source logo</option>
        <option value="false">Hide logo</option>
    </select>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (loadPluginSettings) {
            document.getElementById('fitMode').value = pluginSettings.fitMode || 'contain';
            document.getElementById('backgroundStyle').value = pluginSettings.backgroundStyle || 'blur';
            document.getElementById('showLogo').value = pluginSettings.showLogo || 'true';
        }
    });
</script>

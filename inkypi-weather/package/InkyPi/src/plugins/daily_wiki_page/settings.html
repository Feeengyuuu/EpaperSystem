<input type="hidden" id="refreshOnDisplay" name="refreshOnDisplay" value="true">

<div class="form-group">
  <label class="form-label" for="language">Wikipedia language</label>
  <select id="language" name="language" class="form-input">
    <option value="zh-cn" selected>&#31616;&#20307;&#20013;&#25991;</option>
    <option value="zh">Chinese auto</option>
    <option value="en">English</option>
    <option value="de">German</option>
    <option value="fr">French</option>
    <option value="ja">Japanese</option>
  </select>
</div>

<div class="form-group">
  <label class="form-label" for="fallbackLanguage">Fallback language</label>
  <select id="fallbackLanguage" name="fallbackLanguage" class="form-input">
    <option value="en" selected>English</option>
    <option value="zh-cn">&#31616;&#20307;&#20013;&#25991;</option>
    <option value="zh">Chinese auto</option>
    <option value="">None</option>
  </select>
</div>

<div class="form-group">
  <label class="form-label" for="theme">Theme</label>
  <select id="theme" name="theme" class="form-input">
    <option value="paper" selected>Paper</option>
    <option value="dark">Dark</option>
  </select>
</div>

<div class="form-group">
  <label><input type="checkbox" name="showImage" id="showImage" value="true" checked> Show daily image</label>
  <input type="hidden" name="showImage" value="false">
</div>

<div class="form-group">
  <label><input type="checkbox" name="showOnThisDay" id="showOnThisDay" value="true" checked> Show on-this-day history</label>
  <input type="hidden" name="showOnThisDay" value="false">
</div>

<div class="form-group">
  <label class="form-label" for="fontFamily">Font</label>
  <select id="fontFamily" name="fontFamily" class="form-input">
    {% for font_name in available_fonts %}
      <option value="{{ font_name }}">{{ font_name }}</option>
    {% endfor %}
  </select>
</div>

<div class="form-group">
  <label><input type="checkbox" name="forceRefresh" id="forceRefresh" value="true"> Ignore today's cache once</label>
  <input type="hidden" name="forceRefresh" value="false">
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    if (typeof loadPluginSettings !== 'undefined' && loadPluginSettings) {
      const ids = ['language', 'fallbackLanguage', 'theme', 'fontFamily'];
      ids.forEach((id) => {
        const element = document.getElementById(id);
        if (element && pluginSettings[id] !== undefined) {
          element.value = pluginSettings[id];
        }
      });
      ['showImage', 'showOnThisDay', 'forceRefresh'].forEach((id) => {
        const element = document.getElementById(id);
        if (element && pluginSettings[id] !== undefined) {
          element.checked = pluginSettings[id] === true || pluginSettings[id] === 'true' || pluginSettings[id] === 'on';
        }
      });
    }

    const fontFamily = document.getElementById('fontFamily');
    if (fontFamily) {
      const hasStoredFont = typeof loadPluginSettings !== 'undefined'
        && loadPluginSettings
        && pluginSettings.fontFamily !== undefined;
      const yahei = [...fontFamily.options].find((option) => option.value === 'Microsoft YaHei');
      if (yahei && (!hasStoredFont || fontFamily.value === 'Jost' || !fontFamily.value)) {
        fontFamily.value = 'Microsoft YaHei';
      }
    }
  });
</script>

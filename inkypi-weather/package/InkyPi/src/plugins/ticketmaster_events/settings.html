<div style="margin-bottom:14px;">
    <div style="font-family:'Helvetica Neue',Arial,sans-serif;font-size:1em;color:var(--text-primary);font-weight:500;background:var(--bg-secondary);padding:12px 14px;border-left:3px solid var(--border-color);border-radius:2px;line-height:1.4;max-width:100%;">
        Displays nearby live events from Ticketmaster Discovery API. Default cache refresh is 3 hours.
    </div>
</div>

<div class="form-group">
    <label for="apiKeyEnv" class="form-label">Ticketmaster API key env key:</label>
    <input id="apiKeyEnv" name="apiKeyEnv" class="form-input" value="TICKETMASTER_API_KEY" spellcheck="false">
</div>

<div class="form-group">
    <label for="postalCode" class="form-label">Postal code:</label>
    <input id="postalCode" name="postalCode" class="form-input" value="94539" spellcheck="false">
    <small>Preferred location mode. Leave blank to use city/state below.</small>
</div>

<div class="form-group">
    <label for="city" class="form-label">City:</label>
    <input id="city" name="city" class="form-input" value="Fremont" spellcheck="false">
</div>

<div class="form-group">
    <label for="stateCode" class="form-label">State code:</label>
    <input id="stateCode" name="stateCode" class="form-input" value="CA" spellcheck="false">
</div>

<div class="form-group">
    <label for="countryCode" class="form-label">Country code:</label>
    <input id="countryCode" name="countryCode" class="form-input" value="US" spellcheck="false">
</div>

<div class="form-group">
    <label for="radiusMiles" class="form-label">Search radius:</label>
    <select id="radiusMiles" name="radiusMiles" class="form-input">
        <option value="10">10 miles</option>
        <option value="25">25 miles</option>
        <option value="50" selected>50 miles</option>
        <option value="100">100 miles</option>
    </select>
</div>

<div class="form-group">
    <label for="daysAhead" class="form-label">Upcoming window:</label>
    <select id="daysAhead" name="daysAhead" class="form-input">
        <option value="7" selected>7 days</option>
        <option value="14">14 days</option>
        <option value="30">30 days</option>
        <option value="60">60 days</option>
    </select>
</div>

<div class="form-group">
    <label for="keyword" class="form-label">Keyword filter:</label>
    <input id="keyword" name="keyword" class="form-input" placeholder="Optional artist, team, venue, etc." spellcheck="false">
</div>

<div class="form-group">
    <label for="classificationName" class="form-label">Classification filter:</label>
    <select id="classificationName" name="classificationName" class="form-input">
        <option value="" selected>All events</option>
        <option value="music">Music</option>
        <option value="sports">Sports</option>
        <option value="arts & theatre">Arts & Theatre</option>
        <option value="film">Film</option>
        <option value="miscellaneous">Miscellaneous</option>
    </select>
</div>

<div class="form-group">
    <label for="itemsCount" class="form-label">Number of events:</label>
    <select id="itemsCount" name="itemsCount" class="form-input">
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5" selected>5</option>
    </select>
</div>

<div class="form-group">
    <label for="cacheHours" class="form-label">Refresh cache every:</label>
    <select id="cacheHours" name="cacheHours" class="form-input">
        <option value="1">1 hour</option>
        <option value="3" selected>3 hours</option>
        <option value="6">6 hours</option>
        <option value="12">12 hours</option>
        <option value="24">24 hours</option>
    </select>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (loadPluginSettings) {
            document.getElementById('apiKeyEnv').value = pluginSettings.apiKeyEnv || 'TICKETMASTER_API_KEY';
            document.getElementById('postalCode').value = pluginSettings.postalCode !== undefined ? pluginSettings.postalCode : '94539';
            document.getElementById('city').value = pluginSettings.city || 'Fremont';
            document.getElementById('stateCode').value = pluginSettings.stateCode || 'CA';
            document.getElementById('countryCode').value = pluginSettings.countryCode || 'US';
            document.getElementById('radiusMiles').value = pluginSettings.radiusMiles || '50';
            document.getElementById('daysAhead').value = pluginSettings.daysAhead || '7';
            document.getElementById('keyword').value = pluginSettings.keyword || '';
            document.getElementById('classificationName').value = pluginSettings.classificationName || '';
            document.getElementById('itemsCount').value = pluginSettings.itemsCount || '5';
            document.getElementById('cacheHours').value = pluginSettings.cacheHours || '3';
        }
    });
</script>

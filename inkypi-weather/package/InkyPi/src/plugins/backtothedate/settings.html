<input type="hidden" id="refreshOnDisplay" name="refreshOnDisplay" value="true">

<div class="form-group">
    <label for="fitMode" class="form-label">Fit mode:</label>
    <select id="fitMode" name="fitMode" class="form-input">
        <option value="rotate_portrait" selected>Rotate portrait posters</option>
        <option value="landscape">Keep original orientation</option>
        <option value="contain">Show full poster on plain background</option>
        <option value="cover">Fill screen by cropping</option>
    </select>
    <small style="width: 100%; color: var(--text-primary);">
        Portrait posters rotate 90 degrees counterclockwise. Empty space is filled with a blurred version of the same image.
    </small>
</div>

<div class="form-group">
    <label for="backgroundColor" class="form-label">Background:</label>
    <select id="backgroundColor" name="backgroundColor" class="form-input">
        <option value="white" selected>White</option>
        <option value="black">Black</option>
    </select>
</div>

<div class="form-group">
    <span style="color: var(--text-primary);">
        Source: chineseposters.net. Keep the site's credit/copyright guidance in mind for public use.
    </span>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (loadPluginSettings) {
            const fitMode = pluginSettings.fitMode === 'mosaic' ? 'rotate_portrait' : (pluginSettings.fitMode || 'rotate_portrait');
            document.getElementById('fitMode').value = fitMode;
            document.getElementById('backgroundColor').value = pluginSettings.backgroundColor || 'white';
        }
    });
</script>

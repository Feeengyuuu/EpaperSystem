<div class="form-group">
    <label for="roomsJson" class="form-label">LiveRadar Export JSON (optional):</label>
    <textarea class="form-control" name="roomsJson" id="roomsJson" rows="4" placeholder='{"rooms":[{"platform":"twitch","id":"xqc","isFav":true}]}'></textarea>
</div>

<div class="form-group">
    <label for="apiUrl" class="form-label">Status API:</label>
    <input type="url" class="form-control" name="apiUrl" id="apiUrl" value="https://liveradar.pages.dev/api/status/batch">
</div>

<div class="form-group">
    <label for="cacheSeconds" class="form-label">Status Cache Seconds:</label>
    <input type="number" class="form-control" name="cacheSeconds" id="cacheSeconds" min="20" max="3600" value="60">
</div>

<div class="form-group">
    <label for="snapshotCacheSeconds" class="form-label">Screenshot Cache Seconds:</label>
    <input type="number" class="form-control" name="snapshotCacheSeconds" id="snapshotCacheSeconds" min="30" max="1800" value="60">
</div>

<div class="form-group">
    <label for="maxLiveCards" class="form-label">Max Live Cards:</label>
    <select id="maxLiveCards" name="maxLiveCards" class="form-control">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3" selected>3</option>
    </select>
</div>

<div class="form-group">
    <label for="maxOfflineCards" class="form-label">Max Offline Cards:</label>
    <select id="maxOfflineCards" name="maxOfflineCards" class="form-control">
        <option value="2">2</option>
        <option value="3" selected>3</option>
        <option value="4">4</option>
        <option value="5">5</option>
    </select>
</div>

<div class="form-group">
    <label for="themeMode" class="form-label">Display Theme:</label>
    <select id="themeMode" name="themeMode" class="form-control">
        <option value="auto" selected>Auto Day/Night</option>
        <option value="dark">Night Radar</option>
        <option value="light">Day Paper</option>
    </select>
</div>

<div class="form-group">
    <label for="fetchAvatars" class="form-label">Request Avatars:</label>
    <div class="toggle-container">
        <input type="hidden" id="fetchAvatarsHidden" name="fetchAvatars" value="false">
        <input type="checkbox" id="fetchAvatars" name="fetchAvatars" class="toggle-checkbox" value="true" checked
            onchange="syncFetchAvatarsToggle(this)">
        <label for="fetchAvatars" class="toggle-label"></label>
    </div>
</div>

<div class="form-group">
    <label for="showSnapshots" class="form-label">Show Card Screenshots:</label>
    <div class="toggle-container">
        <input type="hidden" id="showSnapshotsHidden" name="showSnapshots" value="false">
        <input type="checkbox" id="showSnapshots" name="showSnapshots" class="toggle-checkbox" value="true" checked
            onchange="syncShowSnapshotsToggle(this)">
        <label for="showSnapshots" class="toggle-label"></label>
    </div>
</div>

<div class="form-group">
    <label><input type="checkbox" name="forceRefresh" id="forceRefresh"> Ignore cache on next refresh</label>
</div>

<script>
    function syncFetchAvatarsToggle(toggle) {
        document.getElementById('fetchAvatarsHidden').disabled = toggle.checked;
    }

    function syncShowSnapshotsToggle(toggle) {
        document.getElementById('showSnapshotsHidden').disabled = toggle.checked;
    }

    document.addEventListener('DOMContentLoaded', () => {
        const defaults = {
            roomsText: document.getElementById('roomsText').value,
            roomsJson: "",
            apiUrl: "https://liveradar.pages.dev/api/status/batch",
            cacheSeconds: "60",
            snapshotCacheSeconds: "60",
            maxLiveCards: "3",
            maxOfflineCards: "3",
            themeMode: "auto",
            fetchAvatars: true,
            showSnapshots: true,
            refreshOnDisplay: "true",
            forceRefresh: false
        };

        const values = (typeof loadPluginSettings !== 'undefined' && loadPluginSettings)
            ? { ...defaults, ...pluginSettings }
            : defaults;

        for (const [key, value] of Object.entries(values)) {
            const el = document.getElementById(key);
            if (!el) continue;
            if (el.type === 'checkbox') {
                el.checked = value === true || value === 'on' || value === 'true';
            } else {
                el.value = value;
            }
        }

        syncFetchAvatarsToggle(document.getElementById('fetchAvatars'));
        syncShowSnapshotsToggle(document.getElementById('showSnapshots'));
    });
</script>

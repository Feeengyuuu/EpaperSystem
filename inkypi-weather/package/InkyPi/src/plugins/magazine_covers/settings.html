<input type="hidden" id="refreshOnDisplay" name="refreshOnDisplay" value="true">
<input type="hidden" id="dailyLibraryMode" name="dailyLibraryMode" value="true">
<input type="hidden" id="libraryRefreshHours" name="libraryRefreshHours" value="12">

<div class="form-group">
    <label for="rotationMode" class="form-label">Magazine selection:</label>
    <select id="rotationMode" name="rotationMode" class="form-input">
        <option value="random" selected>Random, avoid repeats until the pool is used</option>
        <option value="rotate">Rotate through sources in order</option>
        <option value="single">Use the first source only</option>
    </select>
</div>

<div class="form-group">
    <label for="sources" class="form-label">Sources:</label>
    <textarea
        id="sources"
        name="sources"
        class="form-input"
        rows="8"
        spellcheck="false"
    >{{ default_sources }}</textarea>
    <div style="color: var(--text-primary); font-size: 0.9em; margin-top: 0.35rem;">
        One source per line: <code>Name|https://example.com/current-issue</code>. The plugin looks for the best page image.
    </div>
</div>

<div class="form-group">
    <label for="fitMode" class="form-label">Fit mode:</label>
    <select id="fitMode" name="fitMode" class="form-input">
        <option value="triptych" selected>Three covers with blurred background</option>
        <option value="rotate_full">Rotate portrait covers, show full image</option>
        <option value="contain">Show full image without rotation</option>
        <option value="cover">Fill screen, detect title/logo crop</option>
    </select>
    <div style="color: var(--text-primary); font-size: 0.9em; margin-top: 0.35rem;">
        Three-cover mode keeps the covers plain over a soft blurred backdrop. Single-image modes use plain contain unless cover crop is selected.
    </div>
</div>

<input type="hidden" id="showSourceLabel" name="showSourceLabel" value="true">

<div class="form-group">
    <label for="backgroundStyle" class="form-label">Background style:</label>
    <select id="backgroundStyle" name="backgroundStyle" class="form-input">
        <option value="blur" selected>Blurred cover backdrop</option>
        <option value="plain">Plain color</option>
    </select>
</div>

<div class="form-group">
    <label for="backgroundColor" class="form-label">Background color:</label>
    <select id="backgroundColor" name="backgroundColor" class="form-input">
        <option value="white" selected>White</option>
        <option value="black">Black</option>
    </select>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (loadPluginSettings) {
            document.getElementById('rotationMode').value = pluginSettings.rotationMode || 'random';
            document.getElementById('sources').value = pluginSettings.sources || `{{ default_sources }}`;
            document.getElementById('fitMode').value = pluginSettings.fitMode || 'triptych';
            document.getElementById('backgroundStyle').value = pluginSettings.backgroundStyle || 'blur';
            document.getElementById('backgroundColor').value = pluginSettings.backgroundColor || 'white';
            document.getElementById('showSourceLabel').value = pluginSettings.showSourceLabel || 'true';
            document.getElementById('dailyLibraryMode').value = pluginSettings.dailyLibraryMode || 'true';
            document.getElementById('libraryRefreshHours').value = pluginSettings.libraryRefreshHours || '12';
        }
    });
</script>
